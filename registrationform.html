<!DOCTYPE html>
<html>
<head><title>Registration form</title></head>
<body>
<h1><b><center>REGISTRATION FORM</center></b></h1>
<center><table>
<tr>
<td><label>Name:</label></td>
<td><input type="text" name="Name:" ></td>
</tr>
<tr>
<td><label>Email Id:</label></td>
<td><input type="email" name="Email Id:" ></td>
</tr>
<tr>
<td><label>Mobile:</label></td>
<td><input type="text" name="Mobile:" ></td>
</tr>
<tr>
<td><label>Gender:</label></td>
<td><input type="radio" name="Gender:" value="male" >Male</td>
<td><input type="radio" name="Gender:" value="female" >Female</td>
</tr>
<tr>
<td><label>Date of birth:</label></td>
<td><input type="text" name="Date of birth:" ></td>
</tr>
<tr>
<td><label for="state">state:</label></td>
<td><select name="state" id="state" >
<option name="telangana " value="telangana" >telangana</option>
<option name="ap " value="ap"  >ap</option>
<option name="kmr " value="kmr" >kmr</option></select>
</td>
</tr>
<tr>
<td><label>Languages:</label></td>
<td><input type="checkbox" name="Telugu" value="Telugu">Telugu</td>
<td><input type="checkbox" name="Hindi" value="Hindi">Hindi</td>
<td><input type="checkbox" name="English" value="English">English</td>
</tr>
<tr>
<td colspan="2"><center><button name="submit" type="submit" value="submit"><strong>Submit</strong></center></button></td>
</tr></table></center>
</body>
</html>
